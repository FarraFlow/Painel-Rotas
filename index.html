<!--
  ============================================================================
  PAINEL DE ROTAS — PROTÓTIPO v2
  ----------------------------------------------------------------------------
  Mudanças v2:
   - Removido KM total
   - Removido bairro abaixo do cliente (mantida só REGIÃO + endereço)
   - "RECARREGAR NA SEDE" corrigido
   - Data/hora da última atualização
   - Aba Equipamentos: disponível agora = SEDE (total - alocadas - avariadas - manut)
   - NOVA aba "Vendedor" (esboço): janela de entrega p/ cliente, sem HR. PRÉVIO,
     com itens do pedido e botão de compartilhar no WhatsApp.
  PGTO continua fora desta página (informação restrita).
  Dados = amostra do print de Sábado. Trocar por Google Sheets na produção.
  ============================================================================
-->
<div id="app-root"></div>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root {
    --paper: #FAF6EF; --paper-2: #F2EBDF; --ink: #1C1813; --ink-soft: #6B6256;
    --line: #E3D9C8; --line-strong: #D2C4AC; --amber: #C8761B; --amber-deep: #A85E12;
    --card: #FFFDF9;
    --op-montagem-bg:#E8F2E4; --op-montagem-fg:#2F6B2A;
    --op-recolha-bg:#E2EEF6; --op-recolha-fg:#1F5C86;
    --op-entrega-bg:#FBEEDC; --op-entrega-fg:#9A5B0E;
    --op-recarregar-bg:#EFE7F4; --op-recarregar-fg:#6A3E8E;
    --op-outro-bg:#ECE7DE; --op-outro-fg:#5A5141;
    --wpp:#1FA855;
    font-family:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  #app-root{background:radial-gradient(120% 60% at 50% -10%,#FFFCF5 0%,var(--paper) 60%);color:var(--ink);min-height:100vh;padding-bottom:48px;max-width:760px;margin:0 auto;}

  .topbar{position:sticky;top:0;z-index:30;background:rgba(250,246,239,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:16px 18px 10px;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .brand h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:25px;letter-spacing:-0.5px;line-height:1;}
  .brand .dot{color:var(--amber);}
  .brand .sub{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;}
  .updated{font-size:11px;color:var(--ink-soft);margin-top:4px;font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;gap:5px;}
  .updated .pulse{width:7px;height:7px;border-radius:50%;background:var(--op-montagem-fg);box-shadow:0 0 0 0 rgba(47,107,42,.4);animation:pulse 2.2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(47,107,42,.4);}70%{box-shadow:0 0 0 6px rgba(47,107,42,0);}100%{box-shadow:0 0 0 0 rgba(47,107,42,0);}}

  .days{display:flex;gap:6px;margin-top:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
  .days::-webkit-scrollbar{display:none;}
  .day{flex:0 0 auto;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:13px;letter-spacing:0.5px;padding:8px 14px;border-radius:999px;border:1px solid var(--line-strong);background:transparent;color:var(--ink-soft);cursor:pointer;transition:all .15s;white-space:nowrap;}
  .day:hover{border-color:var(--amber);color:var(--ink);}
  .day.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .day .badge{display:inline-block;margin-left:6px;font-size:11px;color:var(--amber);}
  .day.active .badge{color:#F4B468;}

  .views{display:flex;gap:4px;margin-top:12px;}

<script>
  // ====== CONFIG: cole aqui os 3 links CSV do Google Sheets ======
  const CONFIG = {
    ROTAS:     "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZo0ZtER_L9aJ8iGMSwobojYO_uL5GRvXILN93bY6disXQ63lE1c9qwCnwNTkNURix2yK-MNBKWxF_/pub?gid=0&single=true&output=csv",
    EQUIP_DET: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZo0ZtER_L9aJ8iGMSwobojYO_uL5GRvXILN93bY6disXQ63lE1c9qwCnwNTkNURix2yK-MNBKWxF_/pub?gid=1591888103&single=true&output=csv",
    EQUIP:     "https://docs.google.com/spreadsheets/d/e/2PACX-1vSZo0ZtER_L9aJ8iGMSwobojYO_uL5GRvXILN93bY6disXQ63lE1c9qwCnwNTkNURix2yK-MNBKWxF_/pub?gid=1502468656&single=true&output=csv"
  };

  // URL do Web App (Apps Script) — mesma usada pela macro. Para ler/gravar status.
  const APPS_URL = "https://script.google.com/macros/s/AKfycbym_l1H2FhZbPnbNx_KN3dbAbEO4p7-vLe_fzGWoH4o2HNT2JmFanFXKy7V1ci1G02N/exec";

  let DADOS = null;
  let DETALHES = {};
  let STATUS_MAP = {};   // chave "pedido|OPERACAO" -> "ok" | "nao"
  let ULTIMA_ATUALIZACAO = "";
  let estadoCarga = "carregando";
  let mensagemErro = "";

  const DIAS_FULL={SEG:"Segunda",TER:"Terça",QUA:"Quarta",QUI:"Quinta",SEX:"Sexta",SAB:"Sábado",DOM:"Domingo"};
  const MESES=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];

  // ---- Leitor de CSV (respeita aspas/virgulas dentro de campos) ----
  function parseCSV(text){
    const rows=[]; let row=[],cur='',q=false;
    for(let i=0;i<text.length;i++){
      const ch=text[i];
      if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
      else{
        if(ch==='"') q=true;
        else if(ch===',') { row.push(cur); cur=''; }
        else if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
        else if(ch==='\r'){}
        else cur+=ch;
      }
    }
    if(cur!==''||row.length){ row.push(cur); rows.push(row); }
    return rows;
  }
  function toObjects(text){
    const rows=parseCSV(text).filter(r=>r.length>1||(r.length===1&&r[0]!==''));
    if(!rows.length) return [];
    const head=rows[0].map(h=>h.trim());
    return rows.slice(1).map(r=>{const o={};head.forEach((h,i)=>o[h]=(r[i]||'').trim());return o;});
  }
  function formatTipo(s){
    if(!s) return '';
    let t=s.trim().toLowerCase();
    t=t.charAt(0).toUpperCase()+t.slice(1);
    return t.replace(/110v/g,'110V').replace(/220v/g,'220V').replace(/co²/gi,'CO²');
  }
  function realPedido(ped){ const s=String(ped||'').trim(); return s!=='' && s!=='0'; }
  function barrisItens(p){
    const out=[];
    (p.barris||[]).forEach(b=>{ if(b.q>0) out.push(`${b.q} ${b.q>1?'barris':'barril'} de ${b.tam}`); });
    return out;
  }
  function itensFromDet(d){
    if(!d) return [];
    const out=[],byT={};
    d.chop.forEach(c=>{byT[c.t]=(byT[c.t]||0)+1;});
    Object.keys(byT).forEach(t=>out.push(`${byT[t]} ${t}`));
    if(d.extr.length) out.push(`${d.extr.length} ${d.extr.length>1?'extratoras':'extratora'}`);
    if(d.cil.length) out.push(`${d.cil.length} ${d.cil.length>1?'cilindros CO²':'cilindro CO²'}`);
    return out;
  }
  function normHora(s){
    s=String(s||'').trim();
    if(!s) return '';
    const m=/^(\d{1,2}):(\d{2})/.exec(s);
    if(m) return `${m[1].padStart(2,'0')}:${m[2]}`;
    // Caso venha como fração de dia do Excel (ex.: "0,375" = 09:00)
    const f=parseFloat(s.replace(',','.'));
    if(!isNaN(f)&&f>0&&f<1){
      const mins=Math.round(f*24*60);
      return `${String(Math.floor(mins/60)).padStart(2,'0')}:${String(mins%60).padStart(2,'0')}`;
    }
    return s;
  }
  // Uma parada so vale se tem pedido real (>0), ou endereco, ou e recarga na base.
  function paradaValida(r){
    const ped=parseInt(r.Pedido,10);
    if(!isNaN(ped)&&ped>0) return true;
    if((r.Endereco||'').trim()!=='') return true;
    const op=(r.Operacao||'').toUpperCase().trim();
    return op==='RECARREGAR'||op==='CARREGAR';
  }
  function buildDADOS(rotasRows, detRows, equipRows){
    const dias={SEG:[],TER:[],QUA:[],QUI:[],SEX:[],SAB:[],DOM:[]};
    const rotaMap={};
    rotasRows.forEach(r=>{
      if(!paradaValida(r)) return;
      const key=r.Dia+'|'+r.RotaNum;
      if(!rotaMap[key]){
        const obj={num:r.RotaNum,motorista:r.Motorista,ajudante:r.Ajudante,link_maps:r.LinkMaps,paradas:[]};
        rotaMap[key]=obj; (dias[r.Dia]=dias[r.Dia]||[]).push(obj);
      }
      rotaMap[key].paradas.push({pedido:r.Pedido,vendedor:r.Vendedor,op:r.Operacao,empresa:r.Empresa,
        local:r.Local,regiao:r.Regiao,cliente:r.Cliente,previo:normHora(r.HrPrevio),partir:r.APartirDe,
        evento:r.Evento,endereco:r.Endereco,
        barris:[{tam:'10L',q:Number(r.B10)||0},{tam:'20L',q:Number(r.B20)||0},{tam:'30L',q:Number(r.B30)||0},{tam:'50L',q:Number(r.B50)||0}]});
    });
    const DET={};
    detRows.forEach(d=>{
      if(!DET[d.Pedido]) DET[d.Pedido]={chop:[],extr:[],cil:[]};
      if(d.Categoria==='CHOPEIRA') DET[d.Pedido].chop.push({n:d.Numero,t:formatTipo(d.Descricao)});
      else if(d.Categoria==='EXTRATORA') DET[d.Pedido].extr.push(d.Numero);
      else if(d.Categoria==='CILINDRO') DET[d.Pedido].cil.push({n:d.Numero,cap:d.Descricao});
    });
    Object.values(dias).forEach(rs=>rs.forEach(rt=>rt.paradas.forEach(p=>{
      p.itens=barrisItens(p).concat(realPedido(p.pedido)?itensFromDet(DET[p.pedido]):[]);
    })));
    const equipDia={},diaData={};
    equipRows.forEach(e=>{
      (equipDia[e.Dia]=equipDia[e.Dia]||[]).push({tipo:e.Equipamento,sede:Number(e.SEDE)||0,d1:Number(e.D1)||0,reap:Number(e.REAP)||0,ret:Number(e.RET)||0});
      diaData[e.Dia]=e.Data;
    });
    return {dias,DETALHES:DET,equip_por_dia:equipDia,diaData};
  }
  function tituloDia(dia){
    const dt=(DADOS&&DADOS.diaData)?DADOS.diaData[dia]:'';
    if(!dt) return DIAS_FULL[dia]||dia;
    const p=dt.split('/');
    return `${DIAS_FULL[dia]||dia}, ${parseInt(p[0],10)} de ${MESES[parseInt(p[1],10)-1]||''}`;
  }
  function dataExtenso(dia){
    const dt=(DADOS&&DADOS.diaData)?DADOS.diaData[dia]:'';
    if(!dt) return '';
    const p=dt.split('/');
    return `${parseInt(p[0],10)} de ${MESES[parseInt(p[1],10)-1]||''}`;
  }
  async function carregarDados(){
    estadoCarga="carregando"; render();
    try{
      const [r,d,e]=await Promise.all([
        fetch(CONFIG.ROTAS).then(x=>{if(!x.ok)throw new Error("ROTAS "+x.status);return x.text();}),
        fetch(CONFIG.EQUIP_DET).then(x=>{if(!x.ok)throw new Error("EQUIP_DET "+x.status);return x.text();}),
        fetch(CONFIG.EQUIP).then(x=>{if(!x.ok)throw new Error("EQUIP "+x.status);return x.text();})
      ]);
      const rObjs=toObjects(r);
      const built=buildDADOS(rObjs,toObjects(d),toObjects(e));
      DADOS=built; DETALHES=built.DETALHES;
      ULTIMA_ATUALIZACAO=(rObjs[0]&&rObjs[0].PublicadoEm)?rObjs[0].PublicadoEm:'—';
      await carregarStatus();
      estadoCarga="ok";
    }catch(err){ estadoCarga="erro"; mensagemErro=String(err.message||err); }
    render();
  }

  // Busca todos os status do Apps Script (tolerante: se falhar, painel segue sem checks).
  async function carregarStatus(){
    try{
      const resp=await fetch(APPS_URL).then(x=>x.json());
      STATUS_MAP={};
      (resp.status||[]).forEach(s=>{
        if(s && s.pedido && s.status) STATUS_MAP[s.pedido+'|'+String(s.operacao||'').toUpperCase()]=s.status;
      });
    }catch(_){ /* mantém o que tiver */ }
  }

  // Só faz sentido marcar status quando há pedido real E operação.
  function statusAtivo(p){ return realPedido(p.pedido) && String(p.op||'').trim()!==''; }
  function statusKey(p){ return p.pedido+'|'+String(p.op||'').toUpperCase().trim(); }

  function iconStatus(st){ return st==='ok'?'✅':(st==='nao'?'❌':'⬜'); }

  // Alterna ⬜ -> ✅ -> ❌ -> ⬜. Atualiza só o botão (preserva a rolagem da tabela).
  async function toggleStatus(el, pedido, operacao){
    const key=pedido+'|'+operacao;
    const atual=STATUS_MAP[key]||'';
    const prox = atual===''?'ok':(atual==='ok'?'nao':'');
    if(prox==='') delete STATUS_MAP[key]; else STATUS_MAP[key]=prox;
    el.textContent=iconStatus(prox);
    try{
      const r=await fetch(APPS_URL,{method:'POST',body:JSON.stringify({acao:'salvar_status',pedido:pedido,operacao:operacao,status:prox})}).then(x=>x.json());
      if(!r||!r.ok) throw new Error((r&&r.mensagem)||'falhou');
    }catch(e){
      if(atual==='') delete STATUS_MAP[key]; else STATUS_MAP[key]=atual;
      el.textContent=iconStatus(atual);
      alert('Não consegui salvar o status. Verifique a internet e tente de novo.');
    }
  }

  function statusCell(p){
    if(!statusAtivo(p)) return `<td class="q-st q-st-off">·</td>`;
    const st=STATUS_MAP[statusKey(p)]||'';
    return `<td class="q-st"><button class="st-btn" onclick="toggleStatus(this,'${p.pedido}','${String(p.op||'').toUpperCase().trim()}')">${iconStatus(st)}</button></td>`;
  }
  // Emblema só-leitura para a Detalhada (em branco quando não marcado).
  function statusBadge(p){
    if(!statusAtivo(p)) return '';
    const st=STATUS_MAP[statusKey(p)]||'';
    if(st!=='ok' && st!=='nao') return '';
    return ` <span class="cli-st">${st==='ok'?'✅':'❌'}</span>`;
  }
  const DIAS_LABEL={SEG:"Seg",TER:"Ter",QUA:"Qua",QUI:"Qui",SEX:"Sex",SAB:"Sáb",DOM:"Dom"};
  const SEDE="RUA MAXWELL, 418 - ANDARAÍ, RIO DE JANEIRO";  // origem das rotas
  const OPS_VALIDAS=["MONTAGEM","RECOLHA","ENTREGA","RECARREGAR"];
  const DOW=["DOM","SEG","TER","QUA","QUI","SEX","SAB"];
  const ESTADO_KEY="farraflow_estado";
  function salvarEstado(){ try{ localStorage.setItem(ESTADO_KEY, JSON.stringify(estado)); }catch(_){} }
  function carregarEstadoSalvo(){
    try{ const s=localStorage.getItem(ESTADO_KEY); if(s){ const e=JSON.parse(s); if(e&&e.dia) return e; } }catch(_){}
    return null;
  }
  let estado = carregarEstadoSalvo() || {dia:DOW[new Date().getDay()],view:"rotas",rotasView:"detalhada",vendedor:""};

  function opClass(op){return OPS_VALIDAS.includes(op)?op:"OUTRO";}
  function mapsLink(end){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(end);}
  const pinSvg='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 21s7-6.5 7-12a7 7 0 1 0-14 0c0 5.5 7 12 7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>';

  function janela(previo){
    const m=/^(\d{1,2}):(\d{2})$/.exec(previo||"");
    if(!m) return null;
    let h=+m[1],min=+m[2];
    const fmt=(hh,mm)=>String((hh+24)%24).padStart(2,'0')+":"+String(mm).padStart(2,'0');
    return fmt(h-1,min)+" – "+fmt(h+1,min);
  }

  function render(){
    const app=document.getElementById("app-root");
    if(estadoCarga==="carregando"||!DADOS){
      app.innerHTML=`<div class="loadscr"><div class="ld-dot"></div>Carregando o painel…</div>`;
      return;
    }
    if(estadoCarga==="erro"){
      app.innerHTML=`<div class="loadscr"><div class="ld-x">!</div>Não consegui carregar os dados.<br><small>${mensagemErro}</small><br><button class="ld-btn" onclick="carregarDados()">Tentar de novo</button></div>`;
      return;
    }
    const rotas=DADOS.dias[estado.dia]||[];
    const totalParadas=rotas.reduce((s,r)=>s+r.paradas.length,0);
    const dayBtns=Object.keys(DIAS_LABEL).map(d=>{
      const n=(DADOS.dias[d]||[]).length;
      return `<button class="day ${d===estado.dia?'active':''}" onclick="setDia('${d}')">${DIAS_LABEL[d]}${n?`<span class="badge">${n}</span>`:''}</button>`;
    }).join("");

    let body="";
    if(estado.view==="rotas"){
      if(rotas.length===0){
        body=renderRotas(rotas,totalParadas);
      }else{
        const ger=estado.rotasView==="geral";
        const sub=`<div class="subtabs">
          <button class="subtab ${ger?'':'active'}" onclick="setRotasView('detalhada')">Detalhada</button>
          <button class="subtab ${ger?'active':''}" onclick="setRotasView('geral')">Geral</button>
        </div>`;
        body=sub+(ger?renderQuadro(rotas):renderRotas(rotas,totalParadas));
      }
    }else if(estado.view==="equip"){
      body=renderEquip();
    }else{
      body=renderVendedor(rotas);
    }

    document.getElementById("app-root").innerHTML=`
      <div class="topbar">
        <div class="brand"><h1>Painel Logística<span class="dot">.</span></h1><span class="sub">Farra Flow · Operação</span></div>
        <div class="updated"><span class="pulse"></span> Atualizado em ${ULTIMA_ATUALIZACAO}</div>
        <div class="days">${dayBtns}</div>
        <div class="views">
          <div class="view-tab ${estado.view==='rotas'?'active':''}" onclick="setView('rotas')">Rotas</div>
          <div class="view-tab ${estado.view==='equip'?'active':''}" onclick="setView('equip')">Equipamentos</div>
          <div class="view-tab ${estado.view==='vend'?'active':''}" onclick="setView('vend')">Vendedor</div>
        </div>
      </div>
      <div class="content">${body}</div>`;
  }

  function renderRotas(rotas,totalParadas){
    if(rotas.length===0){
      return `<div class="empty"><div class="big">∅</div>Sem rotas para ${DIAS_LABEL[estado.dia]}.</div>`;
    }
    return `<div class="day-meta"><span class="title">${tituloDia(estado.dia)}</span><span class="count">${rotas.length} rotas · ${totalParadas} paradas</span></div>`+
      rotas.map((r,i)=>{
        const crew=r.ajudante?`${r.motorista} <span style="color:var(--ink-soft);font-weight:500">/ ${r.ajudante}</span>`:r.motorista;
        const stops=r.paradas.map((p,si)=>{
          const detId=`det-${i}-${si}`;
          const temDet=temEquip(p);
          return `<div class="stop">
            <div class="stop-top">
              ${p.pedido&&p.pedido!=="—"?`<span class="pedido">#${p.pedido}</span>`:''}
              <span class="op ${opClass(p.op)}">${p.op}</span>
              ${p.regiao?`<span class="regiao">${p.regiao}</span>`:''}
              ${p.empresa?`<span class="empresa">${p.empresa}</span>`:''}
            </div>
            <div class="cliente">${p.cliente}${statusBadge(p)}</div>
            ${temVendedor(p.vendedor)?`<div class="stop-line"><span class="vend-lbl">Vendedor</span>${p.vendedor}</div>`:''}
            <div class="horarios">
              <div class="h"><span class="lbl">Hr. Prévio</span><span class="val">${p.previo||'—'}</span></div>
              <div class="h"><span class="lbl">A partir de</span><span class="val">${p.partir||'—'}</span></div>
              <div class="h evento"><span class="lbl">Evento</span><span class="val">${p.evento||'—'}</span></div>
            </div>
            ${p.endereco?`<div class="endereco">${pinSvg}<a href="${mapsLink(p.endereco)}" target="_blank" rel="noopener">${p.endereco}</a></div>`:''}
            ${temDet?`<button class="det-btn" onclick="toggleDet('${detId}')"><span class="cv">▾</span> Detalhe dos equipamentos</button>
            <div class="det-panel" id="${detId}">${detPanelHtml(p)}</div>`:''}
          </div>`;
        }).join("");
        // Produção: usar r.link_maps (célula "LINK MAPA:" do bloco, já começa na sede).
        // Fallback do protótipo: montar a rota a partir da SEDE.
        const mapAll = r.link_maps || ("https://www.google.com/maps/dir/"+[SEDE,...r.paradas.filter(p=>p.endereco).map(p=>p.endereco)].map(e=>encodeURIComponent(e)).join("/"));
        return `<div class="rota collapsed" id="rota-${i}">
          <div class="rota-head" onclick="toggle(${i})">
            <div class="rota-num">${r.num}</div>
            <div class="rota-info"><div class="crew">${crew}</div><div class="meta">ROTA ${r.num} · ${r.paradas.length} paradas</div></div>
            <div class="rota-chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg></div>
          </div>
          <div class="stops">${stops}</div>
          <div class="rota-foot"><a href="${mapAll}" target="_blank" rel="noopener">${pinSvg} Abrir rota no Maps</a></div>
        </div>`;
      }).join("");
  }

  function renderQuadro(rotas){
    if(rotas.length===0) return `<div class="empty"><div class="big">\u2205</div>Sem rotas para ${DIAS_LABEL[estado.dia]}.</div>`;
    const cols=['\u2713','Pedido','Vendedor','Opera\u00e7\u00e3o','Empresa','Local','Regi\u00e3o','Cliente','Hr. Pr\u00e9vio','A partir','Evento'];
    let rows='';
    rotas.forEach(r=>{
      const crew=r.ajudante?`${r.motorista} / ${r.ajudante}`:r.motorista;
      rows+=`<tr class="q-rota"><td colspan="${cols.length}"><span class="q-rota-label">ROTA ${r.num} \u00b7 ${crew}</span></td></tr>`;
      rows+=`<tr class="q-head">${cols.map(c=>`<td>${c}</td>`).join('')}</tr>`;
      r.paradas.forEach(p=>{
        rows+=`<tr>
          ${statusCell(p)}
          <td class="q-mono">${p.pedido&&p.pedido!=='\u2014'?p.pedido:'\u2014'}</td>
          <td>${p.vendedor||'\u2014'}</td>
          <td><span class="op ${opClass(p.op)}">${p.op}</span></td>
          <td>${p.empresa||'\u2014'}</td>
          <td>${p.local||'\u2014'}</td>
          <td class="q-mono">${p.regiao||'\u2014'}</td>
          <td class="q-cli">${p.cliente}</td>
          <td class="q-mono">${p.previo||'\u2014'}</td>
          <td class="q-mono">${p.partir||'\u2014'}</td>
          <td class="q-mono q-ev">${p.evento||'\u2014'}</td>
        </tr>`;
      });
    });
    return `<p class="q-hint">\u2194 Arraste para o lado para ver todas as colunas \u00b7 gire o celular para ver mais.</p>
      <div class="q-wrap"><table class="q-table">
        <tbody>${rows}</tbody>
      </table></div>`;
  }

  function renderEquip(){
    const lista=DADOS.equip_por_dia[estado.dia]||[];
    if(lista.length===0) return `<div class="empty"><div class="big">∅</div>Sem dados de equipamentos em ${DIAS_LABEL[estado.dia]}.</div>`;
    return `<p class="equip-intro"><b>SEDE</b> = disponível na sede para encaixe no dia. <b>D+1</b> = com quanto começo o dia seguinte.</p>`+
      lista.map(e=>{
        const low=e.sede<=2;
        const partes=[];
        if(e.reap>0) partes.push(`${e.reap} reaproveitad${e.reap>1?'os':'o'}`);
        if(e.ret>0) partes.push(`${e.ret} retorna${e.ret>1?'m':''} à sede`);
        const sub=partes.length?`<div class="equip-sub">${partes.join('  ·  ')}</div>`:'';
        return `<div class="equip-card">
          <div class="equip-row">
            <span class="tipo">${formatTipo(e.tipo)}</span>
            <span class="equip-big">
              <span class="b disp ${low?'low':''}"><span class="n">${e.sede}</span><span class="l">SEDE hoje</span></span>
              <span class="b d1"><span class="n">${e.d1}</span><span class="l">D+1 (amanhã)</span></span>
            </span>
          </div>
          ${sub}
        </div>`;
      }).join("");
  }

  function temVendedor(v){
    const s=String(v||'').trim();
    return s!=='' && s!=='0';
  }
  function renderVendedor(rotas){
    const paradas=[];
    rotas.forEach(r=>r.paradas.forEach(p=>{
      if(!temVendedor(p.vendedor)) return;   // sem vendedor real -> fora do Vendedor
      paradas.push({...p,motorista:r.motorista,ajudante:r.ajudante});
    }));
    const vendedores=[...new Set(paradas.map(p=>p.vendedor))].sort();
    if(!estado.vendedor||!vendedores.includes(estado.vendedor)) estado.vendedor=vendedores[0]||"";
    if(vendedores.length===0) return `<div class="empty"><div class="big">∅</div>Sem pedidos neste dia.</div>`;

    const opts=vendedores.map(v=>`<option value="${v}" ${v===estado.vendedor?'selected':''}>${v}</option>`).join("");
    const lista=paradas.filter(p=>p.vendedor===estado.vendedor);

    const cards=lista.map((p,idx)=>{
      const j=janela(p.previo);
      const isRec=p.op==="RECOLHA";
      const labelJ=isRec?"Janela de recolha":"Janela de entrega";
      const itens=(p.itens||[]).map(it=>`<span class="it">${it}</span>`).join("");
      const equipe=p.motorista?`${p.motorista}${p.ajudante?` / ${p.ajudante}`:''}`:'';
      return `<div class="vcard">
        <div class="vc-top">
          <span class="op ${opClass(p.op)}">${p.op}</span>
          ${p.regiao?`<span class="vc-reg">${p.regiao}</span>`:''}
        </div>
        <div class="vc-cli">${p.cliente}</div>
        ${equipe?`<div class="vc-crew">🚚 ${isRec?'Recolha':'Entrega'} por <b>${equipe}</b></div>`:''}
        ${j?`<div class="vc-janela ${isRec?'rec':''}"><span class="l">${labelJ}</span><br><span class="v">${j}</span></div>`:''}
        ${itens?`<div class="vc-itens"><span class="vc-itens-lbl">${isRec?'Equipamentos a recolher':'Itens do pedido'}</span>${itens}</div>`:''}
        <button class="vc-share" onclick="shareWhats(${idx})">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-2.8.8.8-2.8-.2-.3A8 8 0 1 1 12 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8s-.4-.1-.5.1-.6.8-.8 1-.3.2-.5 0a6.5 6.5 0 0 1-1.9-1.2 7.3 7.3 0 0 1-1.3-1.7c-.1-.2 0-.4.1-.5l.4-.5.3-.4v-.4c0-.1-.5-1.3-.7-1.8s-.4-.4-.5-.4h-.5a.9.9 0 0 0-.7.3 2.8 2.8 0 0 0-.9 2.1 4.9 4.9 0 0 0 1 2.6 11 11 0 0 0 4.3 3.8c.6.3 1.1.4 1.5.5a3.5 3.5 0 0 0 1.6.1c.5-.1 1.4-.6 1.6-1.1s.2-1 .1-1.1z"/></svg>
          Compartilhar no WhatsApp
        </button>
      </div>`;
    }).join("");

    window.__vendList=lista;
    return `<p class="vend-intro">Janela = 1h antes a 1h depois do Hr. Prévio (o prévio em si não aparece).</p>
      <select class="vend-select" onchange="setVendedor(this.value)">${opts}</select>
      ${cards||'<div class="empty">Sem pedidos para este vendedor.</div>'}`;
  }

  function shareWhats(idx){
    const p=window.__vendList[idx];
    const j=janela(p.previo);
    const isRec=p.op==="RECOLHA";
    const acao=isRec?"a recolha dos seus equipamentos":"a sua entrega";
    const labelJ=isRec?"Janela de recolha":"Janela de entrega";
    const equipe=p.motorista?`${p.motorista}${p.ajudante?` e ${p.ajudante}`:''}`:'';
    const itens=(p.itens||[]).map(i=>'• '+i).join('\n');
    const itensLbl=isRec?"Equipamentos a recolher":"Itens do pedido";
    const diaData=dataExtenso(estado.dia);
    const msg=`Olá! Confirmada ${acao} para o dia ${diaData} 🍻\n\n*${p.cliente}*\n\n📍 ${p.endereco}\n\n🕐 ${labelJ}: *${j||'a combinar'}*\n\n${equipe?`🚚 Equipe responsável: ${equipe}\n\n`:''}*${itensLbl}:*\n${itens}\n\nQualquer dúvida, estou à disposição!`;
    window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
  }

  function setDia(d){estado.dia=d;salvarEstado();render();}
  function setView(v){estado.view=v;salvarEstado();render();}
  function setRotasView(v){estado.rotasView=v;salvarEstado();render();}
  function setVendedor(v){estado.vendedor=v;salvarEstado();render();}
  function temEquip(p){
    const op=(p.op||'').toUpperCase().trim();
    if(op==='RECARREGAR'||op==='CARREGAR') return false;  // recarga na base nao detalha
    const d=realPedido(p.pedido)?DETALHES[p.pedido]:null;
    const temDet=d&&((d.chop&&d.chop.length)||(d.extr&&d.extr.length)||(d.cil&&d.cil.length));
    const temBarris=(p.barris||[]).some(b=>b.q>0);
    return !!(temDet||temBarris);
  }
  function detPanelHtml(p){
    const d=(realPedido(p.pedido)?DETALHES[p.pedido]:null)||{chop:[],extr:[],cil:[]};
    const grupo=(label,arr)=>arr.length?`<div class="det-grupo"><span class="det-lbl">${label}</span><div class="det-nums">${arr.join('')}</div></div>`:'';
    const barris=(p.barris||[]).filter(b=>b.q>0).map(b=>`<span class="det-num"><b>${b.q}×</b><span class="det-meta">${b.tam}</span></span>`);
    const chop=(d.chop||[]).map(c=>`<span class="det-num"><b>${c.n}</b><span class="det-meta">${c.t}</span></span>`);
    const extr=(d.extr||[]).map(e=>`<span class="det-num"><b>${e}</b></span>`);
    const cil=(d.cil||[]).map(c=>`<span class="det-num"><b>${c.n}</b>${c.cap?`<span class="det-meta">${c.cap} L</span>`:''}</span>`);
    return `<div class="det-cols">
      <div class="det-col">${grupo('Chopeira',chop)}${grupo('Barris',barris)}</div>
      <div class="det-col">${grupo('Extratora',extr)}${grupo('Cilindro CO²',cil)}</div>
    </div>`;
  }
  function toggleDet(id){document.getElementById(id).classList.toggle("open");
    const b=document.querySelector(`[onclick="toggleDet('${id}')"]`); if(b)b.classList.toggle("open");}
  function toggle(i){document.getElementById("rota-"+i).classList.toggle("collapsed");}
  carregarDados();
</script>
</body>
</html>
